  ["What should the holistic 360-degree multidimensional progress card proposed in the National Education Policy (NEP) 2020 reflect?", ["Comparison of marks across the state","Progress in cognitive, affective and psychomotor domains","Eight-point grading only","Problem areas only"], 1],

  ["According to Article 45 of the Constitution of India, the State shall endeavour to provide:", ["Free and compulsory education up to 14 years","Early Childhood Care and Education for all children until they complete six years","Free higher education","Equal educational opportunities to all citizens"], 1],

  ["Which of the following practices is prohibited under the Right to Education (RTE) Act?", ["Continuous and Comprehensive Evaluation (CCE)","Screening procedure for admission of children","Inclusive education","School Management Committees"], 1],

  ["Which one of the following is NOT a Fundamental Duty under Article 51A of the Constitution of India?", ["To protect and improve the natural environment","To develop scientific temper, humanism and the spirit of inquiry","To vote in every election","To safeguard public property and abjure violence"], 2],

  ["Which statements regarding the 86th Constitutional Amendment Act, 2002 are correct? 1. Inserted Article 21A. 2. Amended Article 45. 3. Added Article 51A(k). 4. Made education for disabled children (6–18 years) a Fundamental Right.", ["1 and 2 only","1, 2 and 3 only","2, 3 and 4 only","1, 2, 3 and 4"], 1],

  ["Which practice is most effective for cognitive retention?", ["Fragmented facts","Guided exploration of relationships between concepts","Memorization only","Dictation"], 1],

  ["Which Article of the Constitution of India guarantees the Right to Equality?", ["Article 14","Article 19","Article 21","Article 32"], 0],
];
const answers = new Array(Q.length).fill(null);
let startTime = Date.now();
let timerInterval = null;
let submitted = false;

function letter(i){ return String.fromCharCode(65+i); }

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderQuiz(){
  const mount = document.getElementById('quizMount');
  mount.innerHTML = '';
  sections.forEach(sec => {
    for(let i=sec.start; i<sec.start+sec.count; i++){
      if(sec.passageText){
        const p = document.createElement('div');
        p.className = 'passage-box';
        p.innerHTML = sec.passageText.replace(/\n/g, '<br>');
        mount.appendChild(p);
      }

      const item = Q[i];
      if(!item) continue;
      const card = document.createElement('div');
      card.className = 'qcard';
      card.id = 'qcard-' + i;

      const num = document.createElement('div');
      num.className = 'qnum';
      num.textContent = 'Question ' + (i+1) + ' of ' + Q.length;
      card.appendChild(num);

      const qt = document.createElement('div');
      qt.className = 'qtext';
      qt.textContent = item[0];
      card.appendChild(qt);

      const opts = document.createElement('div');
      opts.className = 'options';
      item[1].forEach((optText, oi) => {
        const label = document.createElement('label');
        label.className = 'option';
        label.id = `opt-${i}-${oi}`;
        label.innerHTML = `<input type="radio" name="q${i}" value="${oi}"> <span>${letter(oi)}) ${optText}</span>`;
        label.querySelector('input').addEventListener('change', () => {
          answers[i] = oi;
          updateOptionStyles(i);
          updateProgress();
        });
        opts.appendChild(label);
      });
      card.appendChild(opts);
      mount.appendChild(card);
    }
  });
}

function updateOptionStyles(i){
  const item = Q[i];
  item[1].forEach((_, oi) => {
    const el = document.getElementById(`opt-${i}-${oi}`);
    el.classList.toggle('selected', answers[i] === oi);
  });
}

function updateProgress(){
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('progressFill').style.width = (answered/Q.length*100) + '%';
  document.getElementById('progressLabel').textContent = `${answered} of ${Q.length} answered`;
}

const DURATION_SECONDS = 2 * 60 * 60; // 2 hour test duration

function startTimer(){
  const timerEl = document.getElementById('timer');
  timerInterval = setInterval(() => {
    if(submitted) return;
    const elapsed = Math.floor((Date.now()-startTime)/1000);
    const remaining = DURATION_SECONDS - elapsed;
    if(remaining <= 0){
      timerEl.textContent = '00:00:00';
      gradeAndShow(true);
      return;
    }
    const h = String(Math.floor(remaining/3600)).padStart(2,'0');
    const m = String(Math.floor((remaining%3600)/60)).padStart(2,'0');
    const s = String(remaining%60).padStart(2,'0');
    timerEl.textContent = `${h}:${m}:${s}`;
    if(remaining <= 300){
      timerEl.style.background = 'var(--wrong)';
      timerEl.style.color = '#fff';
    }
  }, 1000);
}

function gradeAndShow(timeExpired){
  if(submitted) return;
  submitted = true;
  clearInterval(timerInterval);
  let correct=0, wrong=0, skipped=0;

  Q.forEach((item, i) => {
    const userAns = answers[i];
    const correctIdx = item[2];
    item[1].forEach((_, oi) => {
      const el = document.getElementById(`opt-${i}-${oi}`);
      el.style.pointerEvents = 'none';
      const input = el.querySelector('input');
      input.disabled = true;
      if(oi === correctIdx) el.classList.add('correct-answer');
    });
    if(userAns === null){
      skipped++;
      const card = document.getElementById('qcard-'+i);
      const flag = document.createElement('div');
      flag.className = 'unanswered-flag';
      flag.textContent = 'Not answered';
      card.appendChild(flag);
    } else if(userAns === correctIdx){
      correct++;
      const el = document.getElementById(`opt-${i}-${userAns}`);
      const badge = document.createElement('span');
      badge.className = 'badge correct';
      badge.textContent = '✓ Correct';
      el.querySelector('span').appendChild(badge);
    } else {
      wrong++;
      const el = document.getElementById(`opt-${i}-${userAns}`);
      el.classList.add('wrong-answer');
      const badge = document.createElement('span');
      badge.className = 'badge wrong';
      badge.textContent = '✗ Your Answer';
      el.querySelector('span').appendChild(badge);
    }
  });

  const maxMarks = 400;
  const obtainedMarks = (correct * 4) - (wrong * 1);
  const pct = Math.max(0, Math.round((obtainedMarks/maxMarks)*100));
  let verdict, verdictSub;
  if(pct >= 85){ verdict = "Excellent — Exam Ready!"; verdictSub = "Your fundamentals across all sections are strong. Focus on speed and accuracy."; }
  else if(pct >= 65){ verdict = "Good Effort"; verdictSub = "Solid grasp overall — revisit the sections where you lost marks."; }
  else if(pct >= 45){ verdict = "Needs More Practice"; verdictSub = "You're on the right track. Revise weaker sections and retake this test."; }
  else { verdict = "Keep Practicing"; verdictSub = "Go through the explanations and revisit core topics systematically."; }

  const elapsed = Math.floor((Date.now()-startTime)/1000);
  const m = Math.floor(elapsed/60), s = elapsed%60;

  const panel = document.createElement('div');
  panel.className = 'results-panel';
  panel.style.setProperty('--pct', pct);
  const nameVal = escapeHtml((document.getElementById('studentName').value || 'Anonymous').trim());
  
  panel.innerHTML = `
    <div class="result-name">📋 Test Result for: ${nameVal}</div>
    <div class="score-ring"><div class="score-inner"><div class="num">${obtainedMarks}</div><div class="den">out of 400</div></div></div>
    <div class="verdict">${verdict}</div>
    <div class="verdict-sub">${verdictSub}</div>
    <div class="stat-row">
      <div class="stat correct"><div class="n">${correct}</div><div class="l">Correct<br>(${correct}×4 = ${correct*4})</div></div>
      <div class="stat wrong"><div class="n">${wrong}</div><div class="l">Wrong<br>(${wrong}×−1 = −${wrong})</div></div>
      <div class="stat skipped"><div class="n">${skipped}</div><div class="l">Skipped<br>(${skipped}×0 = 0)</div></div>
      <div class="stat"><div class="n">${m}m ${s}s</div><div class="l">Time<br>Taken</div></div>
    </div>
    <div class="breakdown-box">
      <div class="breakdown-title">📊 Score Breakdown</div>
      <div class="breakdown-item">
        <span class="breakdown-label">Total Questions:</span>
        <span class="breakdown-value">100</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-label">Correct Answers:</span>
        <span class="breakdown-value">${correct}</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-label">Incorrect Answers:</span>
        <span class="breakdown-value">${wrong}</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-label">Unanswered:</span>
        <span class="breakdown-value">${skipped}</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-label">Accuracy Rate:</span>
        <span class="breakdown-value">${pct}%</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-label">Final Score:</span>
        <span class="breakdown-value" style="color:var(--teal);font-size:14px;font-weight:800;">${obtainedMarks}/400</span>
      </div>
    </div>
    <div class="jump-note"><strong>Marking Scheme:</strong> +4 marks for each correct answer | −1 mark for each wrong answer | 0 marks for unanswered questions | Maximum total: 400 marks</div>
    ${timeExpired ? '<div class="jump-note" style="color:var(--wrong);font-weight:700;">⏱️ Time\'s up — your test was submitted automatically.</div>' : ''}
    <div class="jump-note"><strong>📝 Review:</strong> Scroll down to review your performance — correct answers are marked in green, your incorrect picks in red, and unanswered questions are flagged.</div>
  `;
  document.getElementById('resultsMount').innerHTML = '';
  document.getElementById('resultsMount').appendChild(panel);
  panel.scrollIntoView({behavior:'smooth'});

  document.getElementById('submitBtn').textContent = timeExpired ? '⏱️ Time Up — Test Submitted' : '✓ Test Submitted';
  document.getElementById('submitBtn').disabled = true;
}

document.getElementById('submitBtn').addEventListener('click', () => {
  if(submitted) return;
  gradeAndShow();
});

renderQuiz();
updateProgress();
startTimer();
</script>
</body>
</html>
