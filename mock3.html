<title>Guwahati University B.Ed 2026 — Mock Test 3</title>
<style>
  :root{

    --muga-light:#e8d9bd;
    --correct:#2f6f4e;
    --wrong:#a13d3d;
    --card:#ffffff;
    --line:#dcd4c2;
  }
  *{box-sizing:border-box;}
  body{

    background:var(--paper);
    color:var(--ink);

  }
  .header{
    background:linear-gradient(135deg,var(--teal) 0%,var(--teal-deep) 100%);
    color:var(--muga-light);
    padding:36px 24px 30px;
    text-align:center;
    border-bottom:6px solid var(--muga);
    position:relative;
    overflow:hidden;
  }
  .header::before{
    content:"";
    position:absolute;
    top:-40px; right:-40px;
    width:180px; height:180px;
    border-radius:50%;
    background:rgba(232,217,189,0.08);
  }
  .eyebrow{
    letter-spacing:3px;
    text-transform:uppercase;
    font-size:12px;
    color:var(--muga);
    font-weight:600;
    margin-bottom:8px;
  }
  h1{
    font-family:Georgia,'Noto Serif',serif;
    font-size:clamp(22px,4vw,34px);
    margin:0 0 6px;
    color:#fdfbf6;
    letter-spacing:0.3px;
  }
  .subtitle{
    font-size:14px;
    color:var(--muga-light);
    opacity:0.85;
  }
  .note-banner{
    max-width:820px;
    margin:14px auto 0;
    background:#fff7e8;
    border:1px solid var(--muga);
    color:#5a4620;
    font-size:12.5px;
    padding:8px 16px;
    border-radius:8px;
    text-align:center;
  }
  .container{
    max-width:820px;
    margin:0 auto;
    padding:24px 18px 80px;
  }
  .infobar{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    justify-content:space-between;
    align-items:center;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 18px;
    margin:14px 0 22px;
    box-shadow:0 4px 14px rgba(15,61,62,0.08);
    position:sticky;
    top:10px;
    z-index:20;
  }
  .name-wrap{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:170px;
  }
  .name-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:#7a8a8a;
    font-weight:600;
  }
  .name-input{
    font-family:inherit;
    font-size:14px;
    padding:7px 10px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#faf7f0;
    color:var(--ink);
    outline:none;
    transition:border-color .15s ease;
  }
  .name-input:focus{
    border-color:var(--teal);
  }
  .result-name{
    font-family:Georgia,'Noto Serif',serif;
    font-size:15px;
    color:var(--teal-deep);
    margin-bottom:6px;
    letter-spacing:0.3px;
  }
  .progress-wrap{
    flex:1;
    min-width:160px;
  }
  .progress-track{
    background:var(--muga-light);
    border-radius:6px;
    height:8px;
    overflow:hidden;
  }
  .progress-fill{
    background:var(--teal);
    height:100%;
    width:0%;
    transition:width .25s ease;
  }
  .progress-label{
    font-size:12px;
    color:#5a6b6b;
    margin-top:4px;
  }
  .timer{
    font-variant-numeric:tabular-nums;
    font-weight:700;
    color:var(--teal-deep);
    font-size:15px;
    background:var(--muga-light);
    padding:6px 12px;
    border-radius:8px;
  }

    background:var(--muga-light);
    border-left:4px solid var(--muga);
    padding:16px 18px;
    border-radius:6px;
    font-size:14px;
    margin-bottom:14px;
    color:#3a3226;
  }
  .qcard{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px 18px 14px;
    margin-bottom:14px;
    transition:box-shadow .2s ease, border-color .2s ease;
  }
  .qcard:hover{
    box-shadow:0 3px 12px rgba(15,61,62,0.07);
  }
  .qnum{
    font-family:Georgia,'Noto Serif',serif;
    color:var(--muga);
    font-weight:700;
    font-size:13px;
    margin-bottom:6px;
  }
  .qtext{
    font-size:15.5px;
    font-weight:600;
    margin-bottom:12px;
    color:var(--ink);
  }

    display:grid;
    gap:8px;
  }
  .option{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:9px 12px;
    border:1px solid var(--line);
    border-radius:7px;
    cursor:pointer;
    font-size:14.5px;
    transition:background .15s ease, border-color .15s ease;

  .option:hover{
    background:#faf7f0;
    border-color:var(--muga);
  }
  .option input{
    margin-top:3px;
    accent-color:var(--teal);
  }
  .option.selected{
    background:#eef4ef;
    border-color:var(--teal);
  }
  .option.correct-answer{
    background:#e7f3ea;
    border-color:var(--correct);
    color:#204a34;
  }
  .option.wrong-answer{
    background:#fbeaea;
    border-color:var(--wrong);
    color:#6b2323;
  }
  .badge{
    margin-left:auto;
    font-size:11px;
    font-weight:700;
    padding:2px 8px;
    border-radius:12px;
  }

  .badge.wrong{background:var(--wrong);color:#fff;}

    position:sticky;
    bottom:0;
    background:linear-gradient(to top, var(--paper) 70%, transparent);
    padding:20px 0 10px;
    text-align:center;
  }
  button{
    font-family:inherit;
    font-size:16px;
    font-weight:700;
    padding:14px 34px;
    border-radius:30px;
    border:none;
    cursor:pointer;
    background:var(--teal);
    color:#fdfbf6;
    box-shadow:0 6px 16px rgba(15,61,62,0.25);
    transition:transform .15s ease, background .15s ease;
  }
  button:hover{transform:translateY(-1px);background:var(--teal-deep);}
  button:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:26px 24px;
    margin:26px 0;
    text-align:center;
    box-shadow:0 6px 20px rgba(15,61,62,0.1);
  }
  .score-ring{
    width:140px;height:140px;
    margin:0 auto 14px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:conic-gradient(var(--teal) calc(var(--pct)*1%), var(--muga-light) 0);
  }
  .score-inner{
    width:110px;height:110px;
    border-radius:50%;
    background:var(--card);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }

  .score-inner .den{font-size:12px;color:#7a8a8a;}
  .verdict{font-size:18px;font-weight:700;color:var(--teal-deep);margin-bottom:4px;}
  .verdict-sub{font-size:13.5px;color:#5a6b6b;margin-bottom:16px;}

  .stat{text-align:center;}
  .stat .n{font-size:20px;font-weight:800;font-family:Georgia,serif;}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#7a8a8a;}
  .stat.correct .n{color:var(--correct);}
  .stat.wrong .n{color:var(--wrong);}
  .stat.skipped .n{color:#a08a4a;}

  .unanswered-flag{
    font-size:11px;color:var(--wrong);font-weight:700;margin-top:6px;
  }
  @media (max-width:520px){
    .infobar{margin:10px 0 18px;}
    .qcard{padding:14px 14px 10px;}
  }

</head>

["Who was the first woman Governor of an Indian state?", ["Sarojini Naidu","Sucheta Kripalani","Indira Gandhi","Vijaya Lakshmi Pandit"], 0],
["What is the primary objective of the Mukhya Mantrir Nijut Moina Scheme?", ["To provide free bicycles to students","To encourage girls to continue higher education and reduce child marriage","To provide free healthcare to women","To promote digital education in schools"], 1],
["Which Assam Government scheme provides financial assistance to tea garden workers?", ["Orunodoi 3.0","Mukhya Mantrir Atmanirbhar Asom Abhijan","Chah Bagicha Dhan Puraskar Mela","Apun Ghar Scheme"], 2],
["Which Assam Government scheme aims to provide monthly financial assistance to economically vulnerable families, with women as the primary beneficiaries?", ["Orunodoi 3.0","Apun Bahan Scheme","Nijut Moina Scheme","Mukhya Mantri Lok Sevak Arogya Yojana"], 0],
["Operation Blackboard was launched in which year?", ["1984","1986","1987","1992"], 2]
];

const answers = new Array(Q.length).fill(null);
let startTime = Date.now();
let timerInterval = null;
let submitted = false;

function letter(i){ return String.fromCharCode(65+i); }

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderQuiz(){
  const mount = document.getElementById('quizMount');
  mount.innerHTML = '';
  sections.forEach(sec => {
    for(let i=sec.start; i<sec.start+sec.count; i++){
      if(sec.passageText){
        const p = document.createElement('div');
        p.className = 'passage-box';
        p.innerHTML = sec.passageText.replace(/\n/g, '<br>');
        mount.appendChild(p);
      }

      const item = Q[i];
      if(!item) continue;
      const card = document.createElement('div');
      card.className = 'qcard';
      card.id = 'qcard-' + i;

      const num = document.createElement('div');
      num.className = 'qnum';
      num.textContent = 'Question ' + (i+1) + ' of ' + Q.length;
      card.appendChild(num);

      const qt = document.createElement('div');
      qt.className = 'qtext';
      qt.textContent = item[0];
      card.appendChild(qt);

      const opts = document.createElement('div');
      opts.className = 'options';
      item[1].forEach((optText, oi) => {
        const label = document.createElement('label');
        label.className = 'option';
        label.id = `opt-${i}-${oi}`;
        label.innerHTML = `<input type="radio" name="q${i}" value="${oi}"> <span>${letter(oi)}) ${optText}</span>`;
        label.querySelector('input').addEventListener('change', () => {
          answers[i] = oi;
          updateOptionStyles(i);
          updateProgress();
        });
        opts.appendChild(label);
      });
      card.appendChild(opts);
      mount.appendChild(card);
    }
  });
}

function updateOptionStyles(i){
  const item = Q[i];
  item[1].forEach((_, oi) => {
    const el = document.getElementById(`opt-${i}-${oi}`);
    el.classList.toggle('selected', answers[i] === oi);
  });
}

function updateProgress(){
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('progressFill').style.width = (answered/Q.length*100) + '%';
  document.getElementById('progressLabel').textContent = `${answered} of ${Q.length} answered`;
}

const DURATION_SECONDS = 2 * 60 * 60; // 2 hour test duration

function startTimer(){
  const timerEl = document.getElementById('timer');
  timerInterval = setInterval(() => {
    if(submitted) return;
    const elapsed = Math.floor((Date.now()-startTime)/1000);
    const remaining = DURATION_SECONDS - elapsed;
    if(remaining <= 0){
      timerEl.textContent = '00:00:00';
      gradeAndShow(true);
      return;
    }
    const h = String(Math.floor(remaining/3600)).padStart(2,'0');
    const m = String(Math.floor((remaining%3600)/60)).padStart(2,'0');
    const s = String(remaining%60).padStart(2,'0');
    timerEl.textContent = `${h}:${m}:${s}`;
    if(remaining <= 300){
      timerEl.style.background = 'var(--wrong)';
      timerEl.style.color = '#fff';
    }
  }, 1000);
}

function gradeAndShow(timeExpired){
  if(submitted) return;
  submitted = true;
  clearInterval(timerInterval);
  let correct=0, wrong=0, skipped=0;

  Q.forEach((item, i) => {
    const userAns = answers[i];
    const correctIdx = item[2];
    item[1].forEach((_, oi) => {
      const el = document.getElementById(`opt-${i}-${oi}`);
      el.style.pointerEvents = 'none';
      const input = el.querySelector('input');
      input.disabled = true;
      if(oi === correctIdx) el.classList.add('correct-answer');
    });
    if(userAns === null){
      skipped++;
      const card = document.getElementById('qcard-'+i);
      const flag = document.createElement('div');
      flag.className = 'unanswered-flag';
      flag.textContent = 'Not answered';
      card.appendChild(flag);
    } else if(userAns === correctIdx){
      correct++;
      const el = document.getElementById(`opt-${i}-${userAns}`);
      const badge = document.createElement('span');
      badge.className = 'badge correct';
      badge.textContent = 'Correct';
      el.querySelector('span').appendChild(badge);
    } else {
      wrong++;
      const el = document.getElementById(`opt-${i}-${userAns}`);
      el.classList.add('wrong-answer');
      const badge = document.createElement('span');
      badge.className = 'badge wrong';
      badge.textContent = 'Your answer';
      el.querySelector('span').appendChild(badge);
    }
  });

  const total = Q.length;
  const maxMarks = total * 4;
  const obtainedMarks = (correct * 4) - (wrong * 1);
  const pct = Math.max(0, Math.round((obtainedMarks/maxMarks)*100));
  let verdict, verdictSub;
  if(pct >= 85){ verdict = "Excellent — exam ready"; verdictSub = "Your fundamentals across sections are strong. Focus on speed now."; }
  else if(pct >= 65){ verdict = "Good effort"; verdictSub = "Solid grasp overall — revisit the sections where you lost marks."; }
  else if(pct >= 45){ verdict = "Needs more practice"; verdictSub = "You're on the right track. Revise weaker sections and retake this test."; }
  else { verdict = "Keep practising"; verdictSub = "Go through the explanations below and revisit core policy, GK, and reasoning topics."; }

  const elapsed = Math.floor((Date.now()-startTime)/1000);
  const m = Math.floor(elapsed/60), s = elapsed%60;

  const panel = document.createElement('div');
  panel.className = 'results-panel';
  panel.style.setProperty('--pct', pct);
  const nameVal = escapeHtml((document.getElementById('studentName').value || '').trim());
  panel.innerHTML = `
    ${nameVal ? `<div class="result-name">Result for: ${nameVal}</div>` : ''}
    <div class="score-ring"><div class="score-inner"><div class="num">${obtainedMarks}</div><div class="den">out of ${maxMarks}</div></div></div>
    <div class="verdict">${verdict}</div>
    <div class="verdict-sub">${verdictSub}</div>
    <div class="stat-row">
      <div class="stat correct"><div class="n">${correct}</div><div class="l">Correct (+${correct*4})</div></div>
      <div class="stat wrong"><div class="n">${wrong}</div><div class="l">Incorrect (−${wrong})</div></div>
      <div class="stat skipped"><div class="n">${skipped}</div><div class="l">Skipped (0)</div></div>
      <div class="stat"><div class="n">${m}m ${s}s</div><div class="l">Time Taken</div></div>
    </div>
    <div class="jump-note">Marking scheme: +4 for each correct answer, −1 for each incorrect answer, 0 for skipped questions.</div>
    ${timeExpired ? '<div class="jump-note" style="color:var(--wrong);font-weight:700;">Time\'s up — your test was submitted automatically.</div>' : ''}
    <div class="jump-note">Scroll down to review every question — correct answers are marked in green, your incorrect picks in red.</div>
  `;
  document.getElementById('resultsMount').innerHTML = '';
  document.getElementById('resultsMount').appendChild(panel);
  panel.scrollIntoView({behavior:'smooth'});

  document.getElementById('submitBtn').textContent = timeExpired ? 'Time Up — Test Submitted' : 'Test Submitted';
  document.getElementById('submitBtn').disabled = true;
}

document.getElementById('submitBtn').addEventListener('click', () => {
  if(submitted) return;
  gradeAndShow();
});

renderQuiz();
updateProgress();
startTimer();
</script>
</body>
</html>
