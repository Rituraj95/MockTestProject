<style>
  :root{

    --card:#ffffff;
    --line:#dcd4c2;
  }

  }
  .header{

    text-align:center;
    border-bottom:6px solid var(--muga);
    position:relative;
    overflow:hidden;
  }
  .header::before{
    content:"";
    position:absolute;
    top:-40px; right:-40px;
    width:180px; height:180px;
    border-radius:50%;
    background:rgba(232,217,189,0.08);
  }
  .eyebrow{
    letter-spacing:3px;
    text-transform:uppercase;
    font-size:12px;
    color:var(--muga);
    font-weight:600;
    margin-bottom:8px;
  }
  h1{
    font-family:Georgia,'Noto Serif',serif;
    font-size:clamp(22px,4vw,34px);
    margin:0 0 6px;
    color:#fdfbf6;
    letter-spacing:0.3px;
  }
  .subtitle{
    font-size:14px;
    color:var(--muga-light);
    opacity:0.85;
  }
  .container{
    max-width:820px;
    margin:0 auto;
    padding:24px 18px 80px;
  }
  .infobar{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    justify-content:space-between;
    align-items:center;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 18px;
    margin:14px 0 22px;
    box-shadow:0 4px 14px rgba(15,61,62,0.08);
    position:sticky;
    top:10px;
    z-index:20;
  }
  .name-wrap{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:170px;
  }
  .name-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:#7a8a8a;
    font-weight:600;
  }
  .name-input{
    font-family:inherit;
    font-size:14px;
    padding:7px 10px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#faf7f0;
    color:var(--ink);

    transition:border-color .15s ease;
  }
  .name-input:focus{
    border-color:var(--teal);
  }

    font-family:Georgia,'Noto Serif',serif;
    font-size:18px;
    font-weight:700;
    color:var(--teal-deep);
    margin-bottom:12px;
    letter-spacing:0.3px;
  }
  .progress-wrap{
    flex:1;
    min-width:160px;
  }
  .progress-track{
    background:var(--muga-light);
    border-radius:6px;
    height:8px;
    overflow:hidden;
  }
  .progress-fill{
    background:var(--teal);
    height:100%;
    width:0%;
    transition:width .25s ease;
  }
  .progress-label{
    font-size:12px;
    color:#5a6b6b;
    margin-top:4px;
  }
  .timer{
    font-variant-numeric:tabular-nums;
    font-weight:700;
    color:var(--teal-deep);
    font-size:15px;
    background:var(--muga-light);
    padding:6px 12px;
    border-radius:8px;
  }
  .passage-box{
    background:var(--muga-light);
    border-left:4px solid var(--muga);
    padding:16px 18px;
    border-radius:6px;
    font-size:14px;
    margin-bottom:14px;
    color:#3a3226;
    line-height:1.6;
  }
  .qcard{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px 18px 14px;
    margin-bottom:14px;
    transition:box-shadow .2s ease, border-color .2s ease;
  }
  .qcard:hover{
    box-shadow:0 3px 12px rgba(15,61,62,0.07);
  }
  .qnum{
    font-family:Georgia,'Noto Serif',serif;
    color:var(--muga);
    font-weight:700;
    font-size:13px;
    margin-bottom:6px;
  }
  .qtext{
    font-size:15.5px;
    font-weight:600;
    margin-bottom:12px;
    color:var(--ink);
    line-height:1.6;
  }
  .options{
    display:grid;
    gap:8px;
  }
  .option{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:9px 12px;
    border:1px solid var(--line);
    border-radius:7px;
    cursor:pointer;
    font-size:14.5px;
    transition:background .15s ease, border-color .15s ease;
  }
  .option:hover{
    background:#faf7f0;
    border-color:var(--muga);
  }
  .option input{
    margin-top:3px;
    accent-color:var(--teal);
  }
  .option.selected{
    background:#eef4ef;
    border-color:var(--teal);
  }
  .option.correct-answer{
    background:#e7f3ea;
    border-color:var(--correct);
    color:#204a34;
  }
  .option.wrong-answer{
    background:#fbeaea;
    border-color:var(--wrong);
    color:#6b2323;
  }

    margin-left:auto;
    font-size:11px;
    font-weight:700;
    padding:2px 8px;
    border-radius:12px;
  }
  .badge.correct{background:var(--correct);color:#fff;}
  .badge.wrong{background:var(--wrong);color:#fff;}

  .submit-bar{
    position:sticky;
    bottom:0;
    background:linear-gradient(to top, var(--paper) 70%, transparent);
    padding:20px 0 10px;
    text-align:center;
  }

    font-family:inherit;
    font-size:16px;
    font-weight:700;
    padding:14px 34px;
    border-radius:30px;
    border:none;
    cursor:pointer;
    background:var(--teal);
    color:#fdfbf6;
    box-shadow:0 6px 16px rgba(15,61,62,0.25);
    transition:transform .15s ease, background .15s ease;
  }
  button:hover{transform:translateY(-1px);background:var(--teal-deep);}
  button:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

  .results-panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:26px 24px;
    margin:26px 0;
    text-align:center;
    box-shadow:0 6px 20px rgba(15,61,62,0.1);
  }
  .score-ring{
    width:140px;height:140px;
    margin:0 auto 14px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:conic-gradient(var(--teal) calc(var(--pct)*1%), var(--muga-light) 0);
  }
  .score-inner{
    width:110px;height:110px;
    border-radius:50%;
    background:var(--card);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }

  .score-inner .den{font-size:13px;color:#7a8a8a;font-weight:600;}
  .verdict{font-size:20px;font-weight:700;color:var(--teal-deep);margin-bottom:6px;}
  .verdict-sub{font-size:14px;color:#5a6b6b;margin-bottom:20px;}
  .stat-row{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-top:16px;}
  .stat{text-align:center;}
  .stat .n{font-size:24px;font-weight:800;font-family:Georgia,serif;}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#7a8a8a;margin-top:4px;}
  .stat.correct .n{color:var(--correct);}
  .stat.wrong .n{color:var(--wrong);}
  .stat.skipped .n{color:#a08a4a;}
  .jump-note{font-size:13px;color:#5a6b6b;margin-top:18px;line-height:1.6;}
  .unanswered-flag{
    font-size:11px;color:var(--wrong);font-weight:700;margin-top:6px;
  }
  .breakdown-box{
    background:#f9f7f3;
    border:1px solid var(--line);
    border-radius:8px;
    padding:16px 18px;
    margin-top:20px;
    text-align:left;
  }
  .breakdown-title{
    font-weight:700;
    color:var(--teal-deep);
    margin-bottom:10px;
    font-size:14px;

    padding:6px 0;
    font-size:13px;
    border-bottom:1px solid #ede9df;
  }

  }
  .breakdown-label{
    color:#5a6b6b;
  }
  .breakdown-value{
    font-weight:600;
    color:var(--ink);
  }
  @media (max-width:520px){
    .infobar{margin:10px 0 18px;}
    .qcard{padding:14px 14px 10px;}
    .stat-row{gap:16px;}
  }
</style>
</head>

  ["Which constitutional body has the authority to supervise, direct and control elections in India?", ["Finance Commission","Election Commission of India","Union Public Service Commission","NITI Aayog"], 1],
  ["The idea of the Directive Principles of State Policy in the Indian Constitution has been adopted from the Constitution of:", ["Australia","Ireland","Canada","United States"], 1],
  ["A teacher ensures that every learner, irrespective of ability, gets an opportunity to participate in classroom activities. This reflects the principle of:", ["Competition","Inclusive Education","Discipline","Standardization"], 1],
  ["A student shares a personal problem with the teacher and requests privacy. What should the teacher do?", ["Discuss it with the entire class","Respect the student's confidentiality","Ignore the concern","Inform other students immediately"], 1],
  ["Which of the following qualities is most important for maintaining professional ethics in teaching?", ["Favouring bright students","Fairness and impartiality","Strict punishment","Completing the syllabus early"], 1],
  ["Which of the following is a feature of the Fundamental Rights guaranteed by the Indian Constitution?", ["They are enforceable by courts.","They apply only during emergencies.","They can be suspended by State Governments at any time.","They are merely guidelines for the government."], 0],
  ["Treating all students equally without discrimination demonstrates the value of:", ["Authority","Equity and Social Justice","Competition","Obedience"], 1],
  ["A teacher encourages students to express different viewpoints during classroom discussions. This practice primarily develops:", ["Fear of criticism","Independent and critical thinking","Memorization skills only","Competitive behaviour"], 1],
  ["Who administers the oath of office to the President of India?", ["Prime Minister","Speaker of the Lok Sabha","Chief Justice of India","Vice-President of India"], 2],
  ["The ideals of Justice, Liberty, Equality and Fraternity are enshrined in the:", ["Fundamental Rights","Directive Principles of State Policy","Preamble to the Constitution","Fundamental Duties"], 2],
  ["A teacher uses quizzes, classroom discussions and assignments throughout the academic session to monitor students' progress. This type of assessment is known as:", ["Summative Assessment","Continuous and Formative Assessment","Norm-referenced Assessment","Diagnostic Test"], 1],
  ["Which classroom behaviour is most effective in promoting ethical values among learners?", ["Publicly comparing students' marks","Encouraging honesty, cooperation and mutual respect","Rewarding only high achievers","Ignoring classroom conflicts"], 1]
];



const answers = new Array(Q.length).fill(null);
let startTime = Date.now();
let timerInterval = null;
let submitted = false;

function letter(i){ return String.fromCharCode(65+i); }

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderQuiz(){
  const mount = document.getElementById('quizMount');
  mount.innerHTML = '';
  sections.forEach(sec => {
    for(let i=sec.start; i<sec.start+sec.count; i++){
      if(sec.passageText){
        const p = document.createElement('div');
        p.className = 'passage-box';
        p.innerHTML = sec.passageText.replace(/\n/g, '<br>');
        mount.appendChild(p);
      }

      const item = Q[i];
      if(!item) continue;
      const card = document.createElement('div');
      card.className = 'qcard';
      card.id = 'qcard-' + i;

      const num = document.createElement('div');
      num.className = 'qnum';
      num.textContent = 'Question ' + (i+1) + ' of ' + Q.length;
      card.appendChild(num);

      const qt = document.createElement('div');
      qt.className = 'qtext';
      qt.textContent = item[0];
      card.appendChild(qt);

      const opts = document.createElement('div');
      opts.className = 'options';
      item[1].forEach((optText, oi) => {
        const label = document.createElement('label');
        label.className = 'option';
        label.id = `opt-${i}-${oi}`;
        label.innerHTML = `<input type="radio" name="q${i}" value="${oi}"> <span>${letter(oi)}) ${optText}</span>`;
        label.querySelector('input').addEventListener('change', () => {
          answers[i] = oi;
          updateOptionStyles(i);
          updateProgress();
        });
        opts.appendChild(label);
      });
      card.appendChild(opts);
      mount.appendChild(card);
    }
  });
}

function updateOptionStyles(i){
  const item = Q[i];
  item[1].forEach((_, oi) => {
    const el = document.getElementById(`opt-${i}-${oi}`);
    el.classList.toggle('selected', answers[i] === oi);
  });
}

function updateProgress(){
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('progressFill').style.width = (answered/Q.length*100) + '%';
  document.getElementById('progressLabel').textContent = `${answered} of ${Q.length} answered`;
}

const DURATION_SECONDS = 2 * 60 * 60; // 2 hour test duration

function startTimer(){
  const timerEl = document.getElementById('timer');
  timerInterval = setInterval(() => {
    if(submitted) return;
    const elapsed = Math.floor((Date.now()-startTime)/1000);
    const remaining = DURATION_SECONDS - elapsed;
    if(remaining <= 0){
      timerEl.textContent = '00:00:00';
      gradeAndShow(true);
      return;
    }
    const h = String(Math.floor(remaining/3600)).padStart(2,'0');
    const m = String(Math.floor((remaining%3600)/60)).padStart(2,'0');
    const s = String(remaining%60).padStart(2,'0');
    timerEl.textContent = `${h}:${m}:${s}`;
    if(remaining <= 300){
      timerEl.style.background = 'var(--wrong)';
      timerEl.style.color = '#fff';
    }
  }, 1000);
}

function gradeAndShow(timeExpired){
  if(submitted) return;
  submitted = true;
  clearInterval(timerInterval);
  let correct=0, wrong=0, skipped=0;

  Q.forEach((item, i) => {
    const userAns = answers[i];
    const correctIdx = item[2];
    item[1].forEach((_, oi) => {
      const el = document.getElementById(`opt-${i}-${oi}`);
      el.style.pointerEvents = 'none';
      const input = el.querySelector('input');
      input.disabled = true;
      if(oi === correctIdx) el.classList.add('correct-answer');
    });
    if(userAns === null){
      skipped++;
      const card = document.getElementById('qcard-'+i);
      const flag = document.createElement('div');
      flag.className = 'unanswered-flag';
      flag.textContent = 'Not answered';
      card.appendChild(flag);
    } else if(userAns === correctIdx){
      correct++;
      const el = document.getElementById(`opt-${i}-${userAns}`);
      const badge = document.createElement('span');
      badge.className = 'badge correct';
      badge.textContent = '✓ Correct';
      el.querySelector('span').appendChild(badge);
    } else {
      wrong++;
      const el = document.getElementById(`opt-${i}-${userAns}`);
      el.classList.add('wrong-answer');
      const badge = document.createElement('span');
      badge.className = 'badge wrong';
      badge.textContent = '✗ Your Answer';
      el.querySelector('span').appendChild(badge);
    }
  });

  const maxMarks = 400;
  const obtainedMarks = (correct * 4) - (wrong * 1);
  const pct = Math.max(0, Math.round((obtainedMarks/maxMarks)*100));
  let verdict, verdictSub;
  if(pct >= 85){ verdict = "Excellent — Exam Ready!"; verdictSub = "Your fundamentals across all sections are strong. Focus on speed and accuracy."; }
  else if(pct >= 65){ verdict = "Good Effort"; verdictSub = "Solid grasp overall — revisit the sections where you lost marks."; }
  else if(pct >= 45){ verdict = "Needs More Practice"; verdictSub = "You're on the right track. Revise weaker sections and retake this test."; }
  else { verdict = "Keep Practicing"; verdictSub = "Go through the explanations and revisit core topics systematically."; }

  const elapsed = Math.floor((Date.now()-startTime)/1000);
  const m = Math.floor(elapsed/60), s = elapsed%60;

  const panel = document.createElement('div');
  panel.className = 'results-panel';
  panel.style.setProperty('--pct', pct);
  const nameVal = escapeHtml((document.getElementById('studentName').value || 'Anonymous').trim());
  
  panel.innerHTML = `
    <div class="result-name">📋 Test Result for: ${nameVal}</div>
    <div class="score-ring"><div class="score-inner"><div class="num">${obtainedMarks}</div><div class="den">out of 400</div></div></div>
    <div class="verdict">${verdict}</div>
    <div class="verdict-sub">${verdictSub}</div>
    <div class="stat-row">
      <div class="stat correct"><div class="n">${correct}</div><div class="l">Correct<br>(${correct}×4 = ${correct*4})</div></div>
      <div class="stat wrong"><div class="n">${wrong}</div><div class="l">Wrong<br>(${wrong}×−1 = −${wrong})</div></div>
      <div class="stat skipped"><div class="n">${skipped}</div><div class="l">Skipped<br>(${skipped}×0 = 0)</div></div>
      <div class="stat"><div class="n">${m}m ${s}s</div><div class="l">Time<br>Taken</div></div>
    </div>
    <div class="breakdown-box">
      <div class="breakdown-title">📊 Score Breakdown</div>
      <div class="breakdown-item">
        <span class="breakdown-label">Total Questions:</span>
        <span class="breakdown-value">100</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-label">Correct Answers:</span>
        <span class="breakdown-value">${correct}</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-label">Incorrect Answers:</span>
        <span class="breakdown-value">${wrong}</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-label">Unanswered:</span>
        <span class="breakdown-value">${skipped}</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-label">Accuracy Rate:</span>
        <span class="breakdown-value">${pct}%</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-label">Final Score:</span>
        <span class="breakdown-value" style="color:var(--teal);font-size:14px;font-weight:800;">${obtainedMarks}/400</span>
      </div>
    </div>
    <div class="jump-note"><strong>Marking Scheme:</strong> +4 marks for each correct answer | −1 mark for each wrong answer | 0 marks for unanswered questions | Maximum total: 400 marks</div>
    ${timeExpired ? '<div class="jump-note" style="color:var(--wrong);font-weight:700;">⏱️ Time\'s up — your test was submitted automatically.</div>' : ''}
    <div class="jump-note"><strong>📝 Review:</strong> Scroll down to review your performance — correct answers are marked in green, your incorrect picks in red, and unanswered questions are flagged.</div>
  `;
  document.getElementById('resultsMount').innerHTML = '';
  document.getElementById('resultsMount').appendChild(panel);
  panel.scrollIntoView({behavior:'smooth'});

  document.getElementById('submitBtn').textContent = timeExpired ? '⏱️ Time Up — Test Submitted' : '✓ Test Submitted';
  document.getElementById('submitBtn').disabled = true;
}

document.getElementById('submitBtn').addEventListener('click', () => {
  if(submitted) return;
  gradeAndShow();
});

renderQuiz();
updateProgress();
startTimer();
</script>
</body>
</html>
